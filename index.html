 **技术感字体**：等宽字体用于代码/技术元素&quot;]}],[0,{&quot;id&quot;:[0,&quot;soft-pastel&quot;],&quot;name&quot;:[0,&quot;Soft Pastel&quot;],&quot;description&quot;:[0,&quot;柔和粉彩色系，温馨舒适的视觉体验。适合生活类、健康类应用。&quot;],&quot;cssVariables&quot;:[0,{&quot;--color-bg&quot;:[0,&quot;#fef7f0&quot;],&quot;--color-bg-elevated&quot;:[0,&quot;#ffffff&quot;],&quot;--color-text&quot;:[0,&quot;#5d4e4e&quot;],&quot;--color-text-muted&quot;:[0,&quot;#9a8a8a&quot;],&quot;--color-border&quot;:[0,&quot;rgba(93, 78, 78, 0.1)&quot;],&quot;--color-primary&quot;:[0,&quot;#e8a4b8&quot;],&quot;--color-primary-dim&quot;:[0,&quot;rgba(232, 164, 184, 0.2)&quot;],&quot;--color-amber&quot;:[0,&quot;#f5c86e&quot;],&quot;--color-red&quot;:[0,&quot;#e88b8b&quot;],&quot;--color-blue&quot;:[0,&quot;#a8d4e6&quot;],&quot;--glass-bg&quot;:[0,&quot;rgba(255, 255, 255, 0.7)&quot;],&quot;--glass-border&quot;:[0,&quot;rgba(232, 164, 184, 0.3)&quot;]}],&quot;promptText&quot;:[0,&quot;## 前端设计偏好 - Soft Pastel\n\n&gt; **核心理念**：柔和粉彩色系，营造温馨、舒适、治愈的视觉体验。\n\n### 配色方案\n\n```css\n--color-bg: #fef7f0;           /* 暖白背景 */\n--color-bg-elevated: #ffffff;  /* 纯白 */\n--color-text: #5d4e4e;         /* 暖灰文字 */\n--color-text-muted: #9a8a8a;   /* 次要文字 */\n--color-border: rgba(93, 78, 78, 0.1);\n--color-primary: #e8a4b8;      /* 樱花粉 */\n--color-primary-dim: rgba(232, 164, 184, 0.2);\n--color-amber: #f5c86e;        /* 奶油黄 */\n--color-red: #e88b8b;          /* 珊瑚红 */\n--color-blue: #a8d4e6;         /* 天空蓝 */\n--glass-bg: rgba(255, 255, 255, 0.7);\n--glass-border: rgba(232, 164, 184, 0.3);\n```\n\n### 设计要点\n\n- **柔和色调**：粉彩为主，避免高饱和度\n- **圆润元素**：大圆角，柔和阴影\n- **温馨氛围**：暖色调背景，舒适的对比度\n- **治愈感**：轻盈、透气、不压抑&quot;]}],[0,{&quot;id&quot;:[0,&quot;brutalist-raw&quot;],&quot;name&quot;:[0,&quot;Brutalist Raw&quot;],&quot;description&quot;:[0,&quot;粗野主义风格，原始、粗犷、不加修饰。适合艺术类、实验性项目。&quot;],&quot;cssVariables&quot;:[0,{&quot;--color-bg&quot;:[0,&quot;#ffffff&quot;],&quot;--color-bg-elevated&quot;:[0,&quot;#f0f0f0&quot;],&quot;--color-text&quot;:[0,&quot;#000000&quot;],&quot;--color-text-muted&quot;:[0,&quot;#666666&quot;],&quot;--color-border&quot;:[0,&quot;#000000&quot;],&quot;--color-primary&quot;:[0,&quot;#ff0000&quot;],&quot;--color-primary-dim&quot;:[0,&quot;rgba(255, 0, 0, 0.1)&quot;],&quot;--color-amber&quot;:[0,&quot;#ffcc00&quot;],&quot;--color-red&quot;:[0,&quot;#ff0000&quot;],&quot;--color-blue&quot;:[0,&quot;#0000ff&quot;],&quot;--glass-bg&quot;:[0,&quot;rgba(255, 255, 255, 0.9)&quot;],&quot;--glass-border&quot;:[0,&quot;#000000&quot;]}],&quot;promptText&quot;:[0,&quot;## 前端设计偏好 - Brutalist Raw\n\n&gt; **核心理念**：粗野主义，原始、直白、不加修饰，用极端的简约表达力量。\n\n### 配色方案\n\n```css\n--color-bg: #ffffff;           /* 纯白背景 */\n--color-bg-elevated: #f0f0f0;  /* 浅灰 */\n--color-text: #000000;         /* 纯黑文字 */\n--color-text-muted: #666666;   /* 灰色 */\n--color-border: #000000;       /* 黑色边框 */\n--color-primary: #ff0000;      /* 纯红强调 */\n--color-primary-dim: rgba(255, 0, 0, 0.1);\n--color-amber: #ffcc00;        /* 黄色 */\n--color-red: #ff0000;          /* 红色 */\n--color-blue: #0000ff;         /* 蓝色 */\n--glass-bg: rgba(255, 255, 255, 0.9);\n--glass-border: #000000;\n```\n\n### 设计要点\n\n- **极端对比**：黑白为主，少量纯色点缀\n- **粗犷边框**：2-4px 实线边框\n- **系统字体**：Courier、monospace\n- **无装饰**：没有渐变、阴影、圆角\n- **网格布局**：严格的模块化结构&quot;]}],[0,{&quot;id&quot;:[0,&quot;ocean-deep&quot;],&quot;name&quot;:[0,&quot;Ocean Deep&quot;],&quot;description&quot;:[0,&quot;深海蓝色系，宁静专注的氛围。适合效率工具、阅读类应用。&quot;],&quot;cssVariables&quot;:[0,{&quot;--color-bg&quot;:[0,&quot;#0d1b2a&quot;],&quot;--color-bg-elevated&quot;:[0,&quot;#1b263b&quot;],&quot;--color-text&quot;:[0,&quot;#e0e1dd&quot;],&quot;--color-text-muted&quot;:[0,&quot;#778da9&quot;],&quot;--color-border&quot;:[0,&quot;rgba(119, 141, 169, 0.3)&quot;],&quot;--color-primary&quot;:[0,&quot;#48cae4&quot;],&quot;--color-primary-dim&quot;:[0,&quot;rgba(72, 202, 228, 0.15)&quot;],&quot;--color-amber&quot;:[0,&quot;#f4a261&quot;],&quot;--color-red&quot;:[0,&quot;#e63946&quot;],&quot;--color-blue&quot;:[0,&quot;#48cae4&quot;],&quot;--glass-bg&quot;:[0,&quot;rgba(27, 38, 59, 0.8)&quot;],&quot;--glass-border&quot;:[0,&quot;rgba(72, 202, 228, 0.2)&quot;]}],&quot;promptText&quot;:[0,&quot;## 前端设计偏好 - Ocean Deep\n\n&gt; **核心理念**：深海蓝色系，营造宁静、专注、深邃的氛围。\n\n### 配色方案\n\n```css\n--color-bg: #0d1b2a;           /* 深海蓝背景 */\n--color-bg-elevated: #1b263b;  /* 浅一层 */\n--color-text: #e0e1dd;         /* 浅色文字 */\n--color-text-muted: #778da9;   /* 灰蓝 */\n--color-border: rgba(119, 141, 169, 0.3);\n--color-primary: #48cae4;      /* 海洋亮蓝 */\n--color-primary-dim: rgba(72, 202, 228, 0.15);\n--color-amber: #f4a261;        /* 暖橙 */\n--color-red: #e63946;          /* 珊瑚红 */\n--color-blue: #48cae4;         /* 海洋蓝 */\n--glass-bg: rgba(27, 38, 59, 0.8);\n--glass-border: rgba(72, 202, 228, 0.2);\n```\n\n### 设计要点\n\n- **深蓝主调**：宁静、专注、不刺眼\n- **柔和对比**：文字清晰但不突兀\n- **波浪元素**：可用波浪线、渐变表达海洋感\n- **呼吸感**：适当留白，不拥挤&quot;]}],[0,{&quot;id&quot;:[0,&quot;forest-moss&quot;],&quot;name&quot;:[0,&quot;Forest Moss&quot;],&quot;description&quot;:[0,&quot;森林苔藓色系，自然有机的感觉。适合环保、户外、健康类应用。&quot;],&quot;cssVariables&quot;:[0,{&quot;--color-bg&quot;:[0,&quot;#1a1f16&quot;],&quot;--color-bg-elevated&quot;:[0,&quot;#252b1e&quot;],&quot;--color-text&quot;:[0,&quot;#d4e0c7&quot;],&quot;--color-text-muted&quot;:[0,&quot;#8a9a7c&quot;],&quot;--color-border&quot;:[0,&quot;rgba(138, 154, 124, 0.3)&quot;],&quot;--color-primary&quot;:[0,&quot;#a3b18a&quot;],&quot;--color-primary-dim&quot;:[0,&quot;rgba(163, 177, 138, 0.2)&quot;],&quot;--color-amber&quot;:[0,&quot;#dda15e&quot;],&quot;--color-red&quot;:[0,&quot;#bc6c25&quot;],&quot;--color-blue&quot;:[0,&quot;#606c38&quot;],&quot;--glass-bg&quot;:[0,&quot;rgba(37, 43, 30, 0.8)&quot;],&quot;--glass-border&quot;:[0,&quot;rgba(163, 177, 138, 0.2)&quot;]}],&quot;promptText&quot;:[0,&quot;## 前端设计偏好 - Forest Moss\n\n&gt; **核心理念**：森林苔藓色系，自然、有机、平静的视觉体验。\n\n### 配色方案\n\n```css\n--color-bg: #1a1f16;           /* 深森林背景 */\n--color-bg-elevated: #252b1e;  /* 苔藓绿 */\n--color-text: #d4e0c7;         /* 浅绿文字 */\n--color-text-muted: #8a9a7c;   /* 橄榄绿 */\n--color-border: rgba(138, 154, 124, 0.3);\n--color-primary: #a3b18a;      /* 浅苔藓 */\n--color-primary-dim: rgba(163, 177, 138, 0.2);\n--color-amber: #dda15e;        /* 秋叶黄 */\n--color-red: #bc6c25;          /* 树皮棕 */\n--color-blue: #606c38;         /* 深橄榄 */\n--glass-bg: rgba(37, 43, 30, 0.8);\n--glass-border: rgba(163, 177, 138, 0.2);\n```\n\n### 设计要点\n\n- **自然色调**：绿色系为主，棕色点缀\n- **有机形状**：柔和曲线，避免尖角\n- **质感纹理**：木纹、叶脉等自然元素\n- **平静氛围**：低饱和度，不刺激&quot;]}],[0,{&quot;id&quot;:[0,&quot;sunset-warm&quot;],&quot;name&quot;:[0,&quot;Sunset Warm&quot;],&quot;description&quot;:[0,&quot;日落暖色系，温暖热情的视觉体验。适合社交、娱乐、创意类应用。&quot;],&quot;cssVariables&quot;:[0,{&quot;--color-bg&quot;:[0,&quot;#1f1410&quot;],&quot;--color-bg-elevated&quot;:[0,&quot;#2d1f18&quot;],&quot;--color-text&quot;:[0,&quot;#f5e6d3&quot;],&quot;--color-text-muted&quot;:[0,&quot;#c4a882&quot;],&quot;--color-border&quot;:[0,&quot;rgba(196, 168, 130, 0.2)&quot;],&quot;--color-primary&quot;:[0,&quot;#ff6b35&quot;],&quot;--color-primary-dim&quot;:[0,&quot;rgba(255, 107, 53, 0.2)&quot;],&quot;--color-amber&quot;:[0,&quot;#ffa62b&quot;],&quot;--color-red&quot;:[0,&quot;#ff4444&quot;],&quot;--color-blue&quot;:[0,&quot;#6b5b95&quot;],&quot;--glass-bg&quot;:[0,&quot;rgba(45, 31, 24, 0.8)&quot;],&quot;--glass-border&quot;:[0,&quot;rgba(255, 107, 53, 0.2)&quot;]}],&quot;promptText&quot;:[0,&quot;## 前端设计偏好 - Sunset Warm\n\n&gt; **核心理念**：日落暖色系，温暖、热情、充满活力的视觉体验。\n\n### 配色方案\n\n```css\n--color-bg: #1f1410;           /* 深棕背景 */\n--color-bg-elevated: #2d1f18;  /* 浅棕 */\n--color-text: #f5e6d3;         /* 米白文字 */\n--color-text-muted: #c4a882;   /* 金棕 */\n--color-border: rgba(196, 168, 130, 0.2);\n--color-primary: #ff6b35;      /* 日落橙 */\n--color-primary-dim: rgba(255, 107, 53, 0.2);\n--color-amber: #ffa62b;        /* 金黄 */\n--color-red: #ff4444;          /* 暖红 */\n--color-blue: #6b5b95;         /* 暮光紫 */\n--glass-bg: rgba(45, 31, 24, 0.8);\n--glass-border: rgba(255, 107, 53, 0.2);\n```\n\n### 设计要点\n\n- **暖色主调**：橙、黄、红为主\n- **热情氛围**
